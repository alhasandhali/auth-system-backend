spring:
  application:
    name: AuthAppBackend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true

#configurations
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://auth-system-dhali.netlify.app}

