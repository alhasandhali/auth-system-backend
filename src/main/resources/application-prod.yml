server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Do NOT use update in production
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:https://api.yourdomain.com}
      access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
      refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800} # 1 week
      refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
      cookie-secure: true
      cookie-http-only: true
      cookie-same-site: none
      cookie-domain: ${COOKIE_DOMAIN:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

app:
  frontend-url: ${FRONTEND_URL:https://yourdomain.com}